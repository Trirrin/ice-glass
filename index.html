<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Glass · reusable component</title>
<meta name="description" content="A refractive ice-glass UI effect — SVG displacement, backdrop blur and an edge highlight, with vanilla, React and Vue bindings.">

<!--
  ============================================================
  ICE GLASS · standalone demo
  ============================================================
  Drop-in usage: add class="ice-glass" to any element.
  The script below auto-injects four layers:
    distort  →  blur  →  content  →  edge highlight

  To reuse in your own project copy three things:
    1. <svg>...#ice-lens</svg>    — place anywhere in <body>
    2. <style>.ice-glass {...}</style>
    3. <script>...</script>        — auto-injects layers + MutationObserver

  Compatibility: Chrome 76+, Safari 17.4+, Edge.
  Firefox currently has partial support for `backdrop-filter: url()` —
  it falls back to the plain blur layer.
  ============================================================
-->

<!-- 1. SVG displacement filter: the core refraction effect -->
<svg style="position:absolute; width:0; height:0;" aria-hidden="true">
  <defs>
    <filter id="ice-lens" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="2" result="smoothNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="50"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- 2. Component styles -->
<style>
  .ice-glass {
    position: relative;
    overflow: hidden;
  }

  /* Distort layer: displaces the backdrop, preserves sharp refraction edges */
  .ice-glass > .ig-distort {
    position: absolute; inset: 0;
    border-radius: inherit;
    backdrop-filter: url(#ice-lens);
    -webkit-backdrop-filter: url(#ice-lens);
    pointer-events: none;
    z-index: 0;
  }

  /* Blur layer: gaussian blur + translucent white on top of the distortion */
  .ice-glass > .ig-blur {
    position: absolute; inset: 0;
    border-radius: inherit;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(12px) saturate(170%);
    -webkit-backdrop-filter: blur(12px) saturate(170%);
    pointer-events: none;
    z-index: 1;
  }

  /* Content layer: clean, crisp, unaffected by filters */
  .ice-glass > .ig-content {
    position: relative;
    z-index: 2;
  }

  /* Edge layer: ring-shaped mask that brightens the backdrop for a highlight */
  .ice-glass > .ig-edge {
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    z-index: 3;
    padding: 1.5px;
    box-sizing: border-box;
    backdrop-filter: brightness(1.5) saturate(1.25);
    -webkit-backdrop-filter: brightness(1.5) saturate(1.25);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
  }

  /*
    Global tuning — override these rules to restyle every ice-glass:
      more transparent  → .ig-blur { background: rgba(255,255,255,0.15); backdrop-filter: blur(6px) }
      more frosted      → .ig-blur { background: rgba(255,255,255,0.5);  backdrop-filter: blur(24px) }
      stronger warp     → bump #ice-lens scale="50" up to 80-100
      brighter rim      → .ig-edge { backdrop-filter: brightness(2) }
  */
</style>

<!-- 3. Auto-hydrate script -->
<script>
  (function () {
    function hydrate(el) {
      if (el.dataset.iceReady) return;          // avoid double-injection
      el.dataset.iceReady = '1';

      // move original children into .ig-content
      const content = document.createElement('div');
      content.className = 'ig-content';
      while (el.firstChild) content.appendChild(el.firstChild);

      // build the other three layers
      const distort = document.createElement('div'); distort.className = 'ig-distort';
      const blur    = document.createElement('div'); blur.className    = 'ig-blur';
      const edge    = document.createElement('div'); edge.className    = 'ig-edge';

      // order: distort → blur → content → edge (z-index is a safety net)
      el.append(distort, blur, content, edge);
    }

    function scan(root) {
      if (root.classList?.contains('ice-glass')) hydrate(root);
      root.querySelectorAll?.('.ice-glass').forEach(hydrate);
    }

    // existing elements
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => scan(document.body));
    } else {
      scan(document.body);
    }

    // dynamically added elements
    new MutationObserver(muts => {
      muts.forEach(m => m.addedNodes.forEach(n => {
        if (n.nodeType === 1) scan(n);
      }));
    }).observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>


<!--
  ============================================================
  Demo-only styling below — drop when reusing the component.
  ============================================================
-->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
    color: #fff;
    background: #0a0a0a;
  }

  /* Colorful moving blocks that sit behind the glass */
  .demo-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .demo-bg > div {
    position: absolute;
    will-change: transform;
    animation: drift 20s linear infinite;
  }
  .b1 { width: 180px; height: 180px; background: #ff3d81; top:  6%; left:  4%; }
  .b2 { width: 240px; height: 140px; background: #2e8bff; top: 12%; left: 58%; animation-duration: 24s; }
  .b3 { width: 160px; height: 260px; background: #9b4dff; top: 48%; left: 82%; animation-direction: reverse; }
  .b4 { width: 200px; height: 200px; background: #ffb547; top: 62%; left:  8%; animation-duration: 22s; }
  .b5 { width: 140px; height: 140px; background: #1ed99b; top: 32%; left: 30%; }
  .b6 { width: 110px; height: 220px; background: #ff6b35; top:  4%; left: 40%; animation-direction: reverse; }
  @keyframes drift {
    0%,100% { transform: translate(0, 0) rotate(0deg); }
    50%     { transform: translate(40px, -30px) rotate(6deg); }
  }

  /* Three .ice-glass elements used in the demo */
  .demo-stage { position: relative; z-index: 2; width: 100%; height: 100%; }

  .demo-card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    border-radius: 24px;
    padding: 24px;
  }
  .demo-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .demo-card p  { font-size: 14px; line-height: 1.65; opacity: 0.9; }
  .demo-card code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  .demo-pill {
    position: absolute;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
  }

  .demo-orb {
    position: absolute;
    bottom: 40px; right: 40px;
    width: 120px; height: 120px;
    border-radius: 50%;
  }

  .gh-link {
    position: absolute;
    top: 24px; right: 28px;
    color: #fff;
    font-size: 12px;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
  }
  .gh-link:hover { background: rgba(0,0,0,0.55); }
</style>

<div class="demo-bg">
  <div class="b1"></div>
  <div class="b2"></div>
  <div class="b3"></div>
  <div class="b4"></div>
  <div class="b5"></div>
  <div class="b6"></div>
</div>

<a class="gh-link" href="https://github.com/Trirrin/ice-glass" target="_blank" rel="noopener">GitHub ↗</a>

<div class="demo-stage">

  <!-- All you need is the class. -->
  <div class="ice-glass demo-pill">Ice Glass · reusable component</div>

  <div class="ice-glass demo-card">
    <h2>One class to rule them all</h2>
    <p>Add <code>class="ice-glass"</code> to any element. The runtime rewrites it into four layers — distort, blur, content, edge highlight — and a <code>MutationObserver</code> hydrates elements you add later. Ships with React and Vue bindings too.</p>
  </div>

  <div class="ice-glass demo-orb"></div>

</div>

</body>
</html>
